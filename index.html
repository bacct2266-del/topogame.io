<!DOCTYPE html><html lang="he" dir="rtl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Topo.io</title>    <style>        body, html {            margin: 0;            padding: 0;            overflow: hidden;            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;            background-color: #f0f0f0;            user-select: none;        }        /* ЇіҐ шхЄхтЇЄщ юухюф с-CSS */        #gameCanvas {            display: block;            background-color: #eaeaea;            background-image:                 radial-gradient(circle at 20% 30%, transparent 50%, rgba(200,200,200,0.5) 52%, transparent 55%),                radial-gradient(circle at 75% 60%, transparent 40%, rgba(200,200,200,0.5) 42%, transparent 45%),                radial-gradient(circle at 40% 80%, transparent 60%, rgba(200,200,200,0.5) 62%, transparent 65%);            background-size: 600px 600px;        }        /* ююїі ьхсщ */        #lobby {            position: absolute;            top: 50%;            left: 50%;            transform: translate(-50%, -50%);            background: rgba(255, 255, 255, 0.95);            padding: 30px;            border-radius: 15px;            box-shadow: 0 10px 30px rgba(0,0,0,0.1);            text-align: center;            min-width: 320px;            z-index: 10;        }        h1 { color: #333; margin-bottom: 20px; font-size: 36px; }        input, select, button {            width: 100%;            padding: 12px;            margin: 10px 0;            border-radius: 8px;            border: 1px solid #ccc;            box-sizing: border-box;            font-size: 16px;        }        button {            background-color: #28a745;            color: white;            border: none;            cursor: pointer;            font-weight: bold;            transition: 0.2s;        }        button:hover { background-color: #218838; }        .secondary-btn { background-color: #007bff; }        .secondary-btn:hover { background-color: #0069d9; }                .wheel-btn { background-color: #6f42c1; }        .wheel-btn:hover { background-color: #5a32a3; }        #stats { position: absolute; top: 10px; right: 10px; color: #333; font-weight: bold; font-size: 18px; z-index: 5; background: rgba(255,255,255,0.7); padding: 5px 10px; border-radius: 5px;}        #leaderboard { position: absolute; top: 10px; left: 10px; color: #333; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 10px; min-width: 150px; z-index: 5; text-align: right;}        /* юхурьщэ (чьхЁх· іхЄІщэ) */        .modal {            display: none;            position: absolute;            top: 50%;            left: 50%;            transform: translate(-50%, -50%);            background: white;            padding: 25px;            border-radius: 15px;            box-shadow: 0 10px 40px rgba(0,0,0,0.2);            z-index: 20;            text-align: center;        }        /* ҐщІхс фтьть */        #wheel-container {            width: 200px;            height: 200px;            border-radius: 50%;            border: 5px solid #333;            margin: 15px auto;            position: relative;            transition: transform 3s cubic-bezier(0.1, 0.8, 0.1, 1);            background: conic-gradient(                #28a745 0% 30%,                 #007bff 30% 55%,                 #6f42c1 55% 75%,                 #dc3545 75% 92%,                 #ffc107 92% 100%            );        }        #pointer {            width: 0; height: 0;            border-left: 15px solid transparent;            border-right: 15px solid transparent;            border-top: 20px solid #333;            position: absolute;            top: 110px; left: 50%;            transform: translateX(-50%);            z-index: 25;        }    </style></head><body>    <div id="stats"><span id="coin-count">0</span> ??</div>    <div id="leaderboard">        <h3 id="lb-title">юхсщьщэ</h3>        <ol id="lb-list"></ol>    </div>    <div id="lobby">        <h1 id="lobby-title">Topo.io</h1>        <select id="lang-select" onchange="changeLanguage()">            <option value="he">ҐсЇщ·</option>            <option value="en">English</option>            <option value="ar">???????</option>            <option value="es">Espa?ol</option>            <option value="ja">???</option>            <option value="zh">??</option>            <option value="ko">???</option>        </select>        <input type="text" id="nickname" value="Player" maxlength="15">        <button id="start-btn" onclick="startGame()">їчі</button>        <button class="secondary-btn" id="shop-btn" onclick="toggleModal('shop-modal')">чЁх· ёіщЁщэ</button>        <button class="wheel-btn" id="wheel-btn-lobby" onclick="toggleModal('wheel-modal')">тьть фюць</button>        <p id="daily-status" style="font-size: 12px; color: #666;"></p>    </div>    <div id="pointer" style="display:none;"></div>    <div id="wheel-modal" class="modal">        <h2 id="wheel-title">тьть фюць</h2>        <div id="wheel-container"></div>        <button onclick="spinWheel()" id="spin-btn">ёхсс с-100 ??</button>        <button onclick="toggleModal('wheel-modal')" class="secondary-btn">ётхЇ</button>    </div>    <div id="shop-modal" class="modal">        <h2 id="shop-title">фёіщЁщэ їьъ</h2>        <div id="skins-list" style="margin: 15px 0; max-height: 150px; overflow-y: auto;"></div>        <button onclick="toggleModal('shop-modal')" class="secondary-btn">ётхЇ</button>    </div>    <canvas id="gameCanvas"></canvas>    <script>        const canvas = document.getElementById('gameCanvas');        const ctx = canvas.getContext('2d');        // фтуЇх· Ґхьэ        const MAP_SIZE = 2500;        let gameActive = false;        let coins = parseInt(localStorage.getItem('topo_coins')) || 500;        let currentSkin = '#007bff';        let ownedSkins = JSON.parse(localStorage.getItem('topo_skins_list')) || ['#007bff'];        // ·Їтхэ їЄх·        const translations = {            he: { title: "Topo.io", play: "їчі", shop: "чЁх· ёіщЁщэ", wheel: "тьть фюць", spin: "ёхсс с-100 ??", lb: "юхсщьщэ", daily: "схЁхё щхющ цющя с-00:00!" },            en: { title: "Topo.io", play: "Play", shop: "Skins Shop", wheel: "Lucky Wheel", spin: "Spin for 100 ??", lb: "Leaderboard", daily: "Daily reward resets at 00:00!" },            ar: { title: "Topo.io", play: "рь??", shop: "???? ???????", wheel: "???? ????", spin: "????? ?? 100 ??", lb: "?????????", daily: "???????? ??????? ????? 00:00!" },            es: { title: "Topo.io", play: "Jugar", shop: "Tienda", wheel: "Ruleta", spin: "Girar por 100 ??", lb: "L?deres", daily: "бBono disponible a las 00:00!" },            ja: { title: "Topo.io", play: "???", shop: "????", wheel: "???", spin: "100 ?????", lb: "???", daily: "??00:00?????!" },            zh: { title: "Topo.io", play: "????", shop: "??", wheel: "????", spin: "100 ?? ??", lb: "???", daily: "?????00:00??!" },            ko: { title: "Topo.io", play: "???", shop: "??", wheel: "??? ??", spin: "100 ?? ???", lb: "???", daily: "?? 00:00? ?? ???!" }        };        // щїхщх· юїчі        let player = { x: 1250, y: 1250, radius: 20, score: 20, name: "Player" };        let foods = [];        let bots = [];        let mouse = { x: 1250, y: 1250 };        // р·чхь уґ        window.addEventListener('resize', resizeCanvas);        function resizeCanvas() {            canvas.width = window.innerWidth;            canvas.height = window.innerHeight;        }        resizeCanvas();        updateCoinsDisplay();        checkDailyReward();        changeLanguage();        function updateCoinsDisplay() {            document.getElementById('coin-count').innerText = coins;            localStorage.setItem('topo_coins', coins);        }        function changeLanguage() {            let lang = document.getElementById('lang-select').value;            let t = translations[lang];            document.getElementById('lobby-title').innerText = t.title;            document.getElementById('start-btn').innerText = t.play;            document.getElementById('shop-btn').innerText = t.shop;            document.getElementById('wheel-btn-lobby').innerText = t.wheel;            document.getElementById('spin-btn').innerText = t.spin;            document.getElementById('lb-title').innerText = t.lb;            document.getElementById('daily-status').innerText = t.daily;            document.getElementById('lobby').style.direction = (lang === 'he' || lang === 'ar') ? 'rtl' : 'ltr';        }        // юҐЇы· ЄЇё щхющ (00:00)        function checkDailyReward() {            let lastClaim = localStorage.getItem('topo_last_claim');            let today = new Date().toDateString();            if (lastClaim !== today) {                coins += 200; // юҐЁі щхющ                updateCoinsDisplay();                localStorage.setItem('topo_last_claim', today);                alert("іщсь· 200 юшсҐх· чщЁэ ьхтрщя щхющ!");            }        }        function toggleModal(id) {            let m = document.getElementById(id);            m.style.display = (m.style.display === 'block') ? 'none' : 'block';            if(id === 'wheel-modal') {                document.getElementById('pointer').style.display = m.style.display;            }            if(id === 'shop-modal') updateShopSkins();        }        // тьть фюць        let isSpinning = false;        function spinWheel() {            if (isSpinning || coins < 100) return;            isSpinning = true;            coins -= 100;            updateCoinsDisplay();            let wheel = document.getElementById('wheel-container');            let randomDeg = Math.floor(Math.random() * 360) + 1440; // ьЄчх· 4 ёщсхсщэ            wheel.style.transform = `rotate(${randomDeg}deg)`;            setTimeout(() => {                isSpinning = false;                let finalDeg = randomDeg % 360;                let prize = "";                let color = "";                // чщїхс ЄЇё ьЄщ юҐьх· хЁущЇхщх· ІсҐщэ їЁісҐх                if (finalDeg >= 0 && finalDeg < 108) { prize = "Їтщь (Common)"; color = "#28a745"; } // щЇхі                else if (finalDeg >= 108 && finalDeg < 198) { prize = "ьр ЁЄхє (Uncommon)"; color = "#007bff"; } // ычхь                else if (finalDeg >= 198 && finalDeg < 270) { prize = "рЄщ (Epic)"; color = "#6f42c1"; } // ётхь                else if (finalDeg >= 270 && finalDeg < 331) { prize = "юуфщэ (Amazing)"; color = "#dc3545"; } // рухэ                else { prize = "ртущ (Legendary)"; color = "#ffc107"; } // Іфхс                alert(`цыщ· сёіщя сЇю· ЁущЇх·: ${prize}!`);                if (!ownedSkins.includes(color)) {                    ownedSkins.push(color);                    localStorage.setItem('topo_skins_list', JSON.stringify(ownedSkins));                }            }, 3000);        }        function updateShopSkins() {            let container = document.getElementById('skins-list');            container.innerHTML = "";            ownedSkins.forEach(skin => {                let btn = document.createElement('button');                btn.style.backgroundColor = skin;                btn.innerText = (skin === currentSkin) ? "сїщюхї" : "счЇ ёіщя";                btn.onclick = () => { currentSkin = skin; updateShopSkins(); };                container.appendChild(btn);            });        }        // ф·чь· юїчі        function startGame() {            player.name = document.getElementById('nickname').value || "Player";            player.x = 1250; player.y = 1250; player.radius = 20; player.score = 20;            gameActive = true;            document.getElementById('lobby').style.display = 'none';                        // щІщЇ· рхыь ф·чь·щ хсхшщэ            foods = []; bots = [];            for(let i=0; i<300; i++) spawnFood(false);            for(let i=0; i<15; i++) spawnBot();            // шщщюЇ ісхҐ їь 15 їЁщх· ьЁіхух· ф-100 фющхчух·            setInterval(() => {                if (!gameActive) return;                // ючщі· Ёіхух· 100 щїЁх· ыущ їщфщх ·ющу сущхі 10 сюЄф                foods = foods.filter(f => f.val !== 100);                for(let i=0; i<10; i++) {                    foods.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, val: 100, color: '#dc3545', r: 12 });                }            }, 15000);        }        function spawnFood(onlyNormal = true) {            let x = Math.random() * MAP_SIZE;            let y = Math.random() * MAP_SIZE;            let rand = Math.random() * 100;            let val = 1; let color = '#555'; let r = 4;            if(!onlyNormal) {                if(rand > 99.99) { val = 100000; color = '#ffc107'; r = 35; } // ЁущЇ сішҐ ьр рющ·щ                else if(rand > 99.9) { val = 10000; color = '#dc3545'; r = 25; } // ЁущЇ юрху                else if(rand > 99) { val = 5000; color = '#6f42c1'; r = 20; } // ЁущЇ                else if(rand > 90) { val = 50; color = '#007bff'; r = 10; }                else if(rand > 75) { val = 10; color = '#28a745'; r = 7; }                else if(rand > 50) { val = 5; color = '#17a2b8'; r = 5; }            }            foods.push({ x, y, val, color, r });        }        function spawnBot() {            let names = ["Alpha", "Beta", "Shadow", "TopoKing", "Runner", "Ghost", "Matrix", "Neon"];            bots.push({                x: Math.random() * MAP_SIZE,                y: Math.random() * MAP_SIZE,                radius: Math.random() * 30 + 15,                color: ['#28a745','#007bff','#6f42c1','#dc3545'][Math.floor(Math.random()*4)],                name: names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99)            });        }        // Ґіхс рчЇ ҐысЇ        window.addEventListener('mousemove', (e) => {            if(!gameActive) return;            mouse.x = e.clientX - canvas.width/2 + player.x;            mouse.y = e.clientY - canvas.height/2 + player.y;        });        // ьхьр· фюїчі фюЇыцщ·        function gameLoop() {            ctx.clearRect(0, 0, canvas.width, canvas.height);            if (gameActive) {                // ·ЁхҐ· їчія                let dx = mouse.x - player.x;                let dy = mouse.y - player.y;                let dist = Math.sqrt(dx*dx + dy*dy);                let speed = Math.max(1, 8 - player.radius/50);                if(dist > 5) {                    player.x += (dx / dist) * speed;                    player.y += (dy / dist) * speed;                }                // тсхьх· юЄф ьїчія                player.x = Math.max(0, Math.min(MAP_SIZE, player.x));                player.y = Math.max(0, Math.min(MAP_SIZE, player.y));                // юІьюф ююхіу· сїчія                ctx.save();                ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);                // ІщхЇ тсхьх· фюЄф (фЇщсхҐ фтухь)                ctx.strokeStyle = '#333';                ctx.lineWidth = 5;                ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);                // ІщхЇ рхыь хрыщьф                for (let i = foods.length - 1; i >= 0; i--) {                    let f = foods[i];                    ctx.beginPath();                    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);                    ctx.fillStyle = f.color;                    ctx.fill();                    // сущі· ф·Ётїх· Ґэ фїчія                    let fdx = f.x - player.x;                    let fdy = f.y - player.y;                    if(Math.sqrt(fdx*fdx + fdy*fdy) < player.radius) {                        player.radius += f.val * 0.05; // тущьф фуЇт·щ·                        player.score += f.val;                        foods.splice(i, 1);                        spawnFood(false);                    }                }                // Ёщфхь хІщхЇ схшщэ                for (let i = bots.length - 1; i >= 0; i--) {                    let b = bots[i];                    // ·ЁхҐф ріЇрщ· чІщ чыюф                    b.x += (Math.random() - 0.5) * 4;                    b.y += (Math.random() - 0.5) * 4;                    b.x = Math.max(0, Math.min(MAP_SIZE, b.x));                    b.y = Math.max(0, Math.min(MAP_SIZE, b.y));                    ctx.beginPath();                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);                    ctx.fillStyle = b.color;                    ctx.fill();                    ctx.fillStyle = '#333';                    ctx.font = '12px sans-serif';                    ctx.fillText(b.name, b.x - 15, b.y + 4);                    // схш рхыь їчія                    let bdx = b.x - player.x;                    let bdy = b.y - player.y;                    let bDist = Math.sqrt(bdx*bdx + bdy*bdy);                    if(bDist < b.radius && b.radius > player.radius * 1.2) {                        alert("фсхш рыь рх·ъ! фюїчі ЁтюЇ.");                        gameActive = false;                        document.getElementById('lobby').style.display = 'block';                    }                     // їчія рхыь схш                    else if(bDist < player.radius && player.radius > b.radius * 1.2) {                        player.radius += b.radius * 0.3;                        player.score += Math.floor(b.radius);                        coins += 10; // схЁхё юшсҐх· Ґь фЇщт· схш                        updateCoinsDisplay();                        bots.splice(i, 1);                        spawnBot();                    }                }                // ІщхЇ фїчія їьЁх                ctx.beginPath();                ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);                ctx.fillStyle = currentSkin;                ctx.fill();                ctx.lineWidth = 3;                ctx.strokeStyle = '#fff';                ctx.stroke();                // їэ фїчія с·хъ фҐщтхь                ctx.fillStyle = '#fff';                ctx.font = `${Math.max(12, player.radius/3)}px Arial`;                ctx.textAlign = "center";                ctx.fillText(player.name, player.x, player.y + 5);                ctx.restore();                // Ґуыхя ьхуЇсхЇу Єщішщсщ сцюя рю·                updateLeaderboard();            }            requestAnimationFrame(gameLoop);        }        function updateLeaderboard() {            let list = document.getElementById('lb-list');            list.innerHTML = "";            let allPlayers = [{name: player.name, score: Math.floor(player.score)}];            bots.forEach(b => allPlayers.push({name: b.name, score: Math.floor(b.radius * 2)}));            allPlayers.sort((a,b) => b.score - a.score);            allPlayers.slice(0, 5).forEach(p => {                let li = document.createElement('li');                li.innerText = `${p.name}: ${p.score}`;                if(p.name === player.name) li.style.color = '#28a745';                list.appendChild(li);            });        }        requestAnimationFrame(gameLoop);    </script></body></html>
